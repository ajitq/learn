# Reverse proxy for Learn Anything. Put this in /etc/nginx/sites-available/learn
# then: ln -s ../sites-available/learn /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
#
# For HTTPS, run certbot afterward:  certbot --nginx -d learn.example.com

server {
    listen 80;
    server_name learn.example.com;   # <-- your domain or droplet IP

    # Allow large homework photo uploads (server caps at 15 MB).
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
